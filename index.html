<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upper Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7; 
            min-height: 100vh;
        }
        
        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .header .subtitle { font-size: 12px; color: #666; }
        
        .controls { 
            padding: 10px 15px; 
            background: white; 
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e5ea;
            color: #333;
        }
        .controls button.active { background: #007aff; color: white; }
        
        /* Sound toggle */
        .sound-btn { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }

        .day-marker {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #888;
            background: #f2f2f7;
            font-weight: 600;
        }
        
        .chat-container { 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        
        .message { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .message.right { align-items: flex-end; }
        .message.left { align-items: flex-start; }
        
        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .right .bubble { 
            background: #007aff; 
            color: white; 
            border-bottom-right-radius: 8px;
        }
        .left .bubble { 
            background: #e5e5ea; 
            color: black; 
            border-bottom-left-radius: 8px;
        }
        
        .contact-name { font-size: 11px; color: #666; margin-bottom: 3px; padding-left: 5px; }
        .right .contact-name { text-align: right; padding-right: 5px; padding-left: 0; }
        
        .timestamp { font-size: 10px; color: #999; margin-top: 4px; }
        .message.right .timestamp { text-align: right; }
        
        .read-receipt { 
            font-size: 11px; 
            color: #888; 
            padding-left: 5px; 
            margin-top: -3px;
        }
        .message.right .read-receipt { text-align: right; padding-right: 5px; }

        /* Character initial colors */
        .char-peter { color: #d63031 !important; font-weight: 600; }
        .char-john { color: #0984e3 !important; font-weight: 600; }
        .char-marym { color: #6c5ce7 !important; font-weight: 600; }
        .char-thomas { color: #e17055 !important; font-weight: 600; }
        .char-mary { color: #a29bfe !important; font-weight: 600; }
        .char-joseph { color: #00b894 !important; font-weight: 600; }
        .char-cleopas { color: #fdcb6e !important; font-weight: 600; }

        .typing-name {
            font-size: 12px;
            color: #666;
            padding-left: 5px;
        }
        
        .scroll-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #007aff;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: none;
            z-index: 100;
        }

        /* Message pop animation */
        @keyframes messagePop {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .message.pop .bubble {
            animation: messagePop 0.2s ease-out;
        }

        /* Visual notification flash */
        @keyframes highlightFlash {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(0, 122, 255, 0.3); }
        }
        
        .message.flash .bubble {
            animation: highlightFlash 0.4s ease-out;
        }

        /* New message indicator */
        .new-indicator {
            background: #007aff;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .new-indicator.visible {
            opacity: 1;
        }

        /* Special styles for high-emotion messages */
        .bubble.emotional {
            background: #ff6b6b !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Upper Room Chat</h1>
        <div class="subtitle" id="participant-count">7 participants</div>
    </div>

    <div class="controls">
        <button onclick="setSpeed(1)" id="speed-1">Fast (3 min)</button>
        <button onclick="setSpeed(2)" id="speed-2" class="active">Normal (8 min)</button>
        <button onclick="setSpeed(3)" id="speed-3">Slow (15 min)</button>
        
        <!-- Sound toggle -->
        <button class="sound-btn" id="sound-toggle" onclick="toggleSound()">
            <span id="sound-icon">🔊</span>
            <span id="sound-text">Sound On</span>
        </button>
    </div>

    <div class="chat-container" id="chat"></div>

    <!-- Typing indicator -->
    <div class="typing-name" id="typing-name" style="display: none;"></div>
    <div class="typing" id="typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <!-- New message indicator -->
    <div class="new-indicator" id="new-indicator">New Message</div>

    <button class="scroll-btn" id="scroll-btn" onclick="scrollToBottom()">↓</button>

    <script>
        const messages = [
            // Day 1: Good Friday
            { day: "Day 1 – Good Friday", time: 30 },
            
            { 
                from: "Peter", 
                text: "They took Him. Just... walked right up and took Him.", 
                side: "left",
                charClass: "char-peter"
            },
            { 
                from: "John", 
                text: "I stayed close enough to hear the chief priests whispering. They're preparing a trial before dawn.", 
                side: "left",
                charClass: "char-john"
            },
            { 
                from: "Mary (mother)", 
                text: "Where is He? Let me see my son.", 
                side: "left",
                charClass: "char-mary",
                emotional: true
            },
            { 
                from: "Peter", 
                text: "Not yet, Mary. The guards... too many of them. We'll go when it's safer.", 
                side: "left",
                charClass: "char-peter",
                read: true
            },
            
            { day: "", time: 45 },
            
            { 
                from: "John", 
                text: "They're taking Him to Golgotha. Now.", 
                side: "left",
                charClass: "char-john"
            },
            { 
                from: "Peter", 
                text: "I'm going. Someone needs to be there.", 
                side: "left",
                charClass: "char-peter"
            },
            
            { day: "", time: 60 },
            
            { 
                from: "Mary Magdalene", 
                text: "It's over. He's gone. Just... gone.", 
                side: "left",
                charClass: "char-marym",
                emotional: true
            },
            { 
                from: "Peter", 
                text: "Three crosses. The middle one... I counted the hours. Three hours of darkness.", 
                side: "left",
                charClass: "char-peter",
                read: true
            },

            // THE EARTHQUAKE MOMENT
            { day: "", time: 62, note: "*The ground shook. Everyone felt it.*" },
            
            { 
                from: "John", 
                text: "Did you feel that? The earth... it moved.", 
                side: "left",
                charClass: "char-john"
            },
            { 
                from: "Peter", 
                text: "The temple veil tore. I saw it. Right down the middle.", 
                side: "left",
                charClass: "char-peter"
            },

            // JESUS DIES
            { day: "", time: 65, note: "*It is finished.*" },
            
            { 
                from: "Mary (mother)", 
                text: "My son. My firstborn...", 
                side: "left",
                charClass: "char-mary",
                emotional: true
            },

            { day: "", time: 90 },
            
            { 
                from: "Joseph of Arimathea", 
                text: "I'm going to Pilate. I'll take the body.", 
                side: "left",
                charClass: "char-joseph"
            },
            { 
                from: "Nicodemus", 
                text: "I have spices. About seventy pounds. We won't let Him be forgotten.", 
                side: "left",
                charClass: "char-nicodemus"
            },

            { day: "", time: 120, note: "*Joseph and Nicodemus join the chat*" },
            
            { 
                from: "Peter", 
                text: "They put Him in a new tomb. A stone as big as a cart wheel rolled against it.", 
                side: "left",
                charClass: "char-peter"
            },
            { 
                from: "Mary Magdalene", 
                text: "I'm watching. I won't leave.", 
                side: "left",
                charClass: "char-marym"
            },

            // Day 2: Holy Saturday
            { day: "Day 2 – Holy Saturday", time: 150, note: "*The chat is quiet...*" },

            // Day 3: Easter Morning
            { day: "Day 3 – Resurrection Sunday", time: 200 },
            
            { 
                from: "Mary Magdalene", 
                text: "The stone. It's GONE.", 
                side: "left",
                charClass: "char-marym"
            },
            { 
                from: "Peter", 
                text: "What do you mean gone? Who moved it?", 
                side: "left",
                charClass: "char-peter"
            },

            // THE ANGEL (Mary's perspective)
            { day: "", time: 203, note: "*Mary sees two angels in white*" },

            { 
                from: "Mary Magdalene", 
                text: "Two men... sitting where the body was. They asked why I'm crying.", 
                side: "left",
                charClass: "char-marym"
            },
            
            { day: "", time: 205, note: "*Mary Magdalene is typing...*" },

            { 
                from: "Mary Magdalene", 
                text: "The tomb... it's EMPTY. They took Him! I don't know who!", 
                side: "left",
                charClass: "char-marym",
                read: true,
                emotional: true
            },

            { day: "", time: 210, note: "*Peter and John run to the tomb*" },

            // PETER AT THE TOMB (linen cloths with blood)
            { 
                from: "John", 
                text: "I got there first. Barely caught my breath.", 
                side: "left",
                charClass: "char-john"
            },
            
            { 
                from: "Peter", 
                text: "The linen cloths... just lying there. Like He shed them.", 
                side: "left",
                charClass: "char-peter"
            },

            // THE FACE CLOTH (John 20:7)
            { 
                from: "Peter", 
                text: "And the face cloth... folded separately. Neat. Not thrown aside.", 
                side: "left",
                charClass: "char-peter"
            },

            // BLOOD STAINS (visceral detail)
            { 
                from: "John", 
                text: "I saw it too. The linen... still had the marks. The spices, the blood...", 
                side: "left",
                charClass: "char-john"
            },

            // THE MOMENT OF BELIEF
            { 
                from: "Peter", 
                text: "This wasn't stolen. Thieves don't fold things.", 
                side: "left",
                charClass: "char-peter",
                read: true,
                emotional: true
            },

            // MARY SEES JESUS
            { day: "", time: 220, note: "*Mary stands outside weeping*" },

            { 
                from: "Mary Magdalene", 
                text: "They asked me why I'm crying. I said they took my Lord...", 
                side: "left",
                charClass: "char-marym"
            },

            { day: "", time: 225, note: "*She turns and sees Him*" },

            { 
                from: "Mary Magdalene", 
                text: "He called my name. Just... 'Mary.' I know that voice.", 
                side: "left",
                charClass: "char-marym",
                emotional: true
            },

            // Easter Evening
            { day: "", time: 280, note: "*Later that evening*" },
            
            { 
                from: "Cleopas", 
                text: "We walked to Emmaus. You won't believe what happened.", 
                side: "left",
                charClass: "char-cleopas"
            },
            { 
                from: "Mary (mother)", 
                text: "Tell us. Please.", 
                side: "left",
                charClass: "char-mary",
                read: true
            },
            
            { day: "", time: 290, note: "*Cleopas continues...*" },
            
            { 
                from: "Cleopas", 
                text: "A stranger joined us. Walked with us the whole way.", 
                side: "left",
                charClass: "char-cleopas"
            },

            // THE BREAKING OF BREAD MOMENT
            { 
                from: "Cleopas", 
                text: "He broke bread. Suddenly we knew... but He was gone.", 
                side: "left",
                charClass: "char-cleopas"
            },

            { 
                from: "Mary Magdalene", 
                text: "I saw Him too! He called my name!", 
                side: "left",
                charClass: "char-marym"
            },

            { day: "", time: 300, note: "*The disciples gathered in the upper room*" },
            
            { 
                from: "Peter", 
                text: "We're all here. Doors locked.", 
                side: "left",
                charClass: "char-peter"
            },

            // THOMAS (skepticism + fear)
            { 
                from: "Thomas", 
                text: "Unless I see the nail marks... unless I put my hand where He was pierced...", 
                side: "right",
                charClass: "char-thomas"
            },

            // THE PRESENCE
            { day: "", time: 320, note: "*A presence fills the room...*" },
            
            // PETER'S INNER THOUGHTS (setup for Ascension sequel)
            { 
                from: "Peter", 
                text: "What now? Do we wait? Do we go back to fishing?", 
                side: "left",
                charClass: "char-peter"
            },

            { day: "", time: 340, note: "*...to be continued on Day 40 (Ascension)*" }
        ];

        // State
        let currentMsg = 0;
        let speedMultiplier = 1;
        let isPlaying = true;
        let soundEnabled = false;
        const baseDelay = 8000;

        // Audio context for soft notification sound
        let audioContext = null;

        function toggleSound() {
            soundEnabled = !soundEnabled;
            
            document.getElementById('sound-icon').textContent = soundEnabled ? '🔊' : '🔇';
            document.getElementById('sound-text').textContent = soundEnabled ? 'Sound On' : 'Sound Off';
            
            if (soundEnabled && !audioContext) {
                initAudio();
            }
        }

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNotificationSound() {
            if (!soundEnabled || !audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5 note
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.15, audioContext.currentTime + 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.4);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);

            setTimeout(() => {
                if (!soundEnabled || !audioContext) return;
                
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(659.25, audioContext.currentTime); // E5 note
                
                gain2.gain.setValueAtTime(0, audioContext.currentTime);
                gain2.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 0.1);
                gain2.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.4);
                
                osc2.start(audioContext.currentTime);
                osc2.stop(audioContext.currentTime + 0.5);
            }, 80);
        }

        function setSpeed(level) {
            speedMultiplier = level;
            document.querySelectorAll('.controls button').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === level);
            });
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }

        function showScrollButton() {
            const chat = document.getElementById('chat');
            const scrollBtn = document.getElementById('scroll-btn');
            if (chat.scrollTop + chat.clientHeight < chat.scrollHeight - 100) {
                scrollBtn.style.display = 'block';
            } else {
                scrollBtn.style.display = 'none';
            }
        }

        function showTyping(name) {
            document.getElementById('typing-name').textContent = name + " is typing...";
            document.getElementById('typing-name').style.display = 'block';
            
            const indicator = document.getElementById('typing-indicator');
            indicator.classList.add('active');
        }

        function hideTyping() {
            document.getElementById('typing-name').style.display = 'none';
            document.getElementById('typing-indicator').classList.remove('active');
        }

        function showNewIndicator() {
            const indicator = document.getElementById('new-indicator');
            indicator.classList.add('visible');
            
            setTimeout(() => {
                indicator.classList.remove('visible');
            }, 1500);
        }

        function addMessage(msg, index) {
            const chat = document.getElementById('chat');
            
            if (msg.day && msg.time > 0) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-marker';
                dayDiv.textContent = msg.day;
                chat.appendChild(dayDiv);
            }

            if (msg.note) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'day-marker';
                noteDiv.innerHTML = `<em>${msg.note}</em>`;
                chat.appendChild(noteDiv);
            }

            if (msg.from && msg.text) {
                showTyping(msg.from);
                
                playNotificationSound();
                showNewIndicator();
                
                setTimeout(() => {
                    hideTyping();
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${msg.side} pop flash`;
                    
                    const charClass = msg.charClass || 'char-peter';
                    const emotionalClass = msg.emotional ? 'emotional' : '';
                    
                    msgDiv.innerHTML = `
                        <div class="contact-name"><span class="${charClass}">${msg.from}</span></div>
                        <div class="bubble ${emotionalClass}">${msg.text}</div>
                        ${msg.read ? '<div class="read-receipt">Read</div>' : ''}
                        <div class="timestamp">${formatTime(msg.time)}</div>
                    `;
                    
                    chat.appendChild(msgDiv);
                    scrollToBottom();
                }, 1000);
            }

            if (currentMsg + 1 < messages.length) {
                let delay = baseDelay / speedMultiplier;
                delay = delay * (0.7 + Math.random() * 0.5);
                
                setTimeout(() => {
                    currentMsg++;
                    play();
                }, delay);
            } else {
                isPlaying = false;
                hideTyping();
                const endDiv = document.createElement('div');
                endDiv.className = 'day-marker';
                endDiv.innerHTML = `<em style="color: #007aff">...to be continued on Day 40 (Ascension)</em>`;
                chat.appendChild(endDiv);
            }
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            const ampm = hours >= 12 ? 'PM' : 'AM';
            let h = hours %  12 || 12;
            return `${h}:${mins.toString().padStart(2, '0')} ${ampm}`;
        }

        function play() {
            if (!isPlaying) return;
            
            const msg = messages[currentMsg];
            addMessage(msg, currentMsg);
        }

        window.onload = () => {
            setTimeout(play, 1000);
            
            const chat = document.getElementById('chat');
            chat.addEventListener('scroll', showScrollButton);
            showScrollButton();
        };
    </script>
</body>
</html>
