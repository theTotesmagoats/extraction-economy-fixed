<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upper Room Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7; 
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .header .subtitle { font-size: 12px; color: #666; }
        
        /* Speed Controls */
        .controls { 
            padding: 10px 15px; 
            background: white; 
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: #e5e5ea;
            color: #333;
        }
        .controls button.active { background: #007aff; color: white; }
        
        /* Day Marker */
        .day-marker {
            text-align: center;
            padding: 20px 15px;
            font-size: 14px;
            color: #888;
            background: #f2f2f7;
            font-weight: 600;
        }
        
        /* Chat Container */
        .chat-container { 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        
        /* Message Bubbles */
        .message { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .message.right { align-items: flex-end; }
        .message.left { align-items: flex-start; }
        
        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .right .bubble { 
            background: #007aff; 
            color: white; 
            border-bottom-right-radius: 8px;
        }
        .left .bubble { 
            background: #e5e5ea; 
            color: black; 
            border-bottom-left-radius: 8px;
        }
        
        /* Contact Name */
        .contact-name { font-size: 11px; color: #666; margin-bottom: 3px; padding-left: 5px; }
        .right .contact-name { text-align: right; padding-right: 5px; padding-left: 0; }
        
        /* Timestamp */
        .timestamp { font-size: 10px; color: #999; margin-top: 4px; }
        .message.right .timestamp { text-align: right; }
        
        /* Read Receipts */
        .read-receipt { 
            font-size: 11px; 
            color: #888; 
            padding-left: 5px; 
            margin-top: -3px;
        }
        .message.right .read-receipt { text-align: right; padding-right: 5px; }
        
        /* Typing Indicator */
        .typing { 
            display: flex; 
            gap: 4px; 
            padding: 10px 15px; 
            margin-bottom: 8px;
            opacity: 0;
        }
        .typing.active { opacity: 1; animation: fadeIn 0.3s forwards; }
        .dot { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* Scroll to bottom button */
        .scroll-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #007aff;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: none;
            z-index: 100;
        }
        
        /* Bible Reference */
        .bible-ref { 
            font-size: 10px; 
            color: #888; 
            padding-left: 5px; 
            margin-top: -2px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Upper Room Chat</h1>
        <div class="subtitle" id="participant-count">5 participants</div>
    </div>

    <div class="controls">
        <button onclick="setSpeed(1)" id="speed-1">Fast (3 min)</button>
        <button onclick="setSpeed(2)" id="speed-2" class="active">Normal (8 min)</button>
        <button onclick="setSpeed(3)" id="speed-3">Slow (15 min)</button>
    </div>

    <div class="chat-container" id="chat">
        <!-- Messages will appear here -->
    </div>

    <button class="scroll-btn" id="scroll-btn" onclick="scrollToBottom()">↓</button>

    <script>
        // Message data - Good Friday to Easter Evening
        const messages = [
            // Day 1: Good Friday
            { day: "Day 1 – Good Friday", time: 30 },
            { from: "Peter", text: "They took him. Just like that.", side: "left" },
            { from: "John", text: "I followed them to the palace. They're preparing a trial.", side: "left" },
            { from: "Mary (mother)", text: "Where is he? I need to see him.", side: "left" },
            { 
                from: "Peter", 
                text: "Don't go yet. The guards... they're everywhere.", 
                side: "left",
                read: true
            },
            { day: "", time: 45 },
            { from: "John", text: "They're crucifying him. Now.", side: "left" },
            { from: "Peter", text: "I'm going to follow. Someone needs to be there.", side: "left" },
            { day: "", time: 60 },
            { from: "Mary Magdalene", text: "It's done. He's dead.", side: "left" },
            { 
                from: "Peter", 
                text: "I counted three crosses. Middle one... was him.", 
                side: "left",
                read: true
            },
            { day: "", time: 90 },
            { from: "Joseph of Arimathea", text: "I'm going to Pilate. I'll take the body.", side: "left" },
            { from: "Nicodemus", text: "I have spices. We won't let him be forgotten.", side: "left" },
            { 
                day: "", 
                time: 120,
                note: "*Joseph and Nicodemus join the chat*"
            },
            { from: "Peter", text: "They put him in a new tomb. A stone rolled against it.", side: "left" },
            { from: "Mary Magdalene", text: "I'm watching. I won't leave.", side: "left" },

            // Day 2: Holy Saturday (Silence)
            { day: "Day 2 – Holy Saturday", time: 150, note: "*The chat is quiet...*" },

            // Day 3: Easter Morning
            { day: "Day 3 – Resurrection Sunday", time: 200 },
            { from: "Mary Magdalene", text: "The stone... it's GONE.", side: "left" },
            { from: "Peter", text: "What do you mean gone?", side: "left" },
            { 
                from: "Mary Magdalene", 
                text: "The tomb is empty. They took him! I don't know who!", 
                side: "left",
                read: true
            },
            { day: "", time: 210, note: "*Peter and John join the tomb*" },
            { from: "John", text: "I ran faster. I got there first.", side: "left" },
            { 
                from: "Peter", 
                text: "The linen cloths... just lying there. Like he shed them.", 
                side: "left",
                read: true
            },
            { day: "", time: 225, note: "*Mary Magdalene sees something*" },
            { from: "Mary Magdalene", text: "Two men in white... they asked why I'm crying.", side: "left" },

            // Easter Evening (Road to Emmaus & Upper Room)
            { day: "", time: 280, note: "*Later that evening*" },
            { from: "Cleopas", text: "We walked all the way to Emmaus. You won't believe it.", side: "left" },
            { 
                from: "Mary (mother)", 
                text: "Tell us everything. Please.", 
                side: "left",
                read: true
            },
            { from: "Cleopas", text: "He joined us on the road. We didn't know it was him.", side: "left" },
            { from: "Mary Magdalene", text: "I saw him too! He called my name!", side: "left" },
            { 
                day: "", 
                time: 300,
                note: "*The disciples are gathered in the upper room*"
            },
            { from: "Peter", text: "We're all here. The doors are locked.", side: "left" },
            { from: "Thomas", text: "Where is he? I need to see the wounds.", side: "right" },
            { 
                day: "", 
                time: 320,
                note: "*A presence fills the room...*"
            }
        ];

        // State
        let currentMsg = 0;
        let speedMultiplier = 1; // 1=fast, 2=normal, 3=slow
        let isPlaying = true;
        const baseDelay = 8000; // 8 seconds between messages at normal speed

        function setSpeed(level) {
            speedMultiplier = level;
            document.querySelectorAll('.controls button').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === level);
            });
        }

        function scrollToBottom() {
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }

        function showScrollButton() {
            const chat = document.getElementById('chat');
            const scrollBtn = document.getElementById('scroll-btn');
            if (chat.scrollTop + chat.clientHeight < chat.scrollHeight - 100) {
                scrollBtn.style.display = 'block';
            } else {
                scrollBtn.style.display = 'none';
            }
        }

        function addMessage(msg, index) {
            const chat = document.getElementById('chat');
            
            // Day marker
            if (msg.day && msg.time > 0) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-marker';
                dayDiv.textContent = msg.day;
                chat.appendChild(dayDiv);
            }

            // Note (italic text for events)
            if (msg.note) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'day-marker';
                noteDiv.innerHTML = `<em>${msg.note}</em>`;
                chat.appendChild(noteDiv);
            }

            // Message bubble
            if (msg.from && msg.text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.side}`;
                
                msgDiv.innerHTML = `
                    <div class="contact-name">${msg.from}</div>
                    <div class="bubble">${msg.text}</div>
                    ${msg.read ? '<div class="read-receipt">Read</div>' : ''}
                    <div class="timestamp">${formatTime(msg.time)}</div>
                `;
                
                chat.appendChild(msgDiv);
            }

            scrollToBottom();
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            const ampm = hours >= 12 ? 'PM' : 'AM';
            let h = hours % 12 || 12;
            return `${h}:${mins.toString().padStart(2, '0')} ${ampm}`;
        }

        function play() {
            if (!isPlaying) return;
            
            const msg = messages[currentMsg];
            addMessage(msg, currentMsg);
            
            currentMsg++;
            
            if (currentMsg < messages.length) {
                // Calculate delay based on speed and message "weight"
                let delay = baseDelay / speedMultiplier;
                
                // Add some randomness for realism
                delay = delay * (0.8 + Math.random() * 0.4);
                
                setTimeout(play, delay);
            } else {
                isPlaying = false;
                const chat = document.getElementById('chat');
                const endDiv = document.createElement('div');
                endDiv.className = 'day-marker';
                endDiv.innerHTML = `<em style="color: #007aff">...to be continued on Day 40</em>`;
                chat.appendChild(endDiv);
            }
        }

        // Initialize
        window.onload = () => {
            setTimeout(play, 1000);
            
            const chat = document.getElementById('chat');
            chat.addEventListener('scroll', showScrollButton);
            showScrollButton();
        };
    </script>
</body>
</html>
